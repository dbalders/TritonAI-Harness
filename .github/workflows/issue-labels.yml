name: Issue Labels

on:
  push:
    branches:
      - main
    paths:
      - .github/ISSUE_TEMPLATE/**
      - .github/workflows/issue-labels.yml
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    name: Sync issue labels
    runs-on: ubuntu-24.04
    steps:
      - name: Ensure managed issue labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const managedLabels = [
              {
                name: "feature",
                color: "a2eeef",
                description: "A product idea, enhancement, or new capability request.",
              },
              {
                name: "bug",
                color: "d73a4a",
                description: "Something is broken or behaving incorrectly.",
              },
              {
                name: "documentation",
                color: "0075ca",
                description: "Documentation-only work.",
              },
              {
                name: "question",
                color: "d876e3",
                description: "A question or support-style discussion.",
              },
              {
                name: "maintenance",
                color: "cfd3d7",
                description: "Internal cleanup, tooling, tests, or upkeep.",
              },
              {
                name: "research",
                color: "d876e3",
                description: "Investigation or decision work before implementation.",
              },
              {
                name: "blocked",
                color: "b60205",
                description: "Blocked by tests, review, missing info, or another dependency.",
              },
              {
                name: "needs review",
                color: "fbca04",
                description: "Needs human product or maintainer review.",
              },
              {
                name: "needs decision",
                color: "d4c5f9",
                description: "Needs a maintainer decision or manual follow-up.",
              },
              {
                name: "automation candidate",
                color: "bfd4f2",
                description: "May be suitable for automation after approval or clarification.",
              },
              {
                name: "auto PR",
                color: "5319e7",
                description: "Automation is allowed to attempt a pull request.",
              },
              {
                name: "accepted",
                color: "0e8a16",
                description: "Accepted direction, not necessarily ready for automation.",
              },
              {
                name: "ready",
                color: "1d76db",
                description: "Scoped and ready for implementation.",
              },
              {
                name: "declined",
                color: "7057ff",
                description: "Not planned or not appropriate for this project.",
              },
              {
                name: "S",
                color: "ededed",
                description: "Small issue scope estimate.",
              },
              {
                name: "M",
                color: "ededed",
                description: "Medium issue scope estimate.",
              },
              {
                name: "L",
                color: "ededed",
                description: "Large issue scope estimate.",
              },
              {
                name: "XL",
                color: "ededed",
                description: "Extra-large issue scope estimate.",
              },
              {
                name: "XXL",
                color: "ededed",
                description: "Very large issue scope estimate.",
              },
              {
                name: "automation:upstream-sync",
                color: "5319e7",
                description: "Generated TritonAI Harness upstream sync work.",
              },
              {
                name: "automation:release-sync",
                color: "5319e7",
                description: "Generated TritonAI Harness parent release sync work.",
              },
              {
                name: "automation:auto-merge-ready",
                color: "0e8a16",
                description: "Automation classified this sync as safe to merge after checks.",
              },
              {
                name: "agent-attempted",
                color: "bfdadc",
                description: "An agent attempted review or repair for this sync.",
              },
              {
                name: "ai-review-risk",
                color: "fbca04",
                description: "AI review found risk or could not classify the sync as safe.",
              },
              {
                name: "checks-failed",
                color: "b60205",
                description: "Local validation failed during automated sync.",
              },
              {
                name: "needs-human-review",
                color: "d4c5f9",
                description: "Automation could not complete this safely without maintainer review.",
              },
              {
                name: "upstream-conflict",
                color: "b60205",
                description: "Automated upstream sync encountered merge conflicts.",
              },
            ];

            for (const label of managedLabels) {
              try {
                const { data: existing } = await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });

                if (
                  existing.color !== label.color ||
                  (existing.description ?? "") !== label.description
                ) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                }
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                } catch (createError) {
                  if (createError.status !== 422) {
                    throw createError;
                  }
                }
              }
            }
