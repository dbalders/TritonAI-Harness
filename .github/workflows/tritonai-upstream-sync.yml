name: TritonAI Upstream Sync

on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:
    inputs:
      downstream_branch:
        description: "TritonAI Harness branch to merge upstream into"
        required: true
        default: main
        type: string
      create_pr:
        description: "Push sync branch and open a PR"
        required: true
        default: true
        type: boolean
      skip_checks:
        description: "Skip local quality checks"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: tritonai-upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Merge upstream into TritonAI Harness branch
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - name: Checkout Harness repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup T3 Code upstream remote
        run: |
          if git remote get-url t3code-upstream >/dev/null 2>&1; then
            test "$(git remote get-url --all t3code-upstream)" = "https://github.com/pingdotgg/t3code.git"
          else
            git remote add t3code-upstream https://github.com/pingdotgg/t3code.git
          fi
          git config --unset-all remote.t3code-upstream.pushurl || :
          git config --add remote.t3code-upstream.pushurl DISABLED
          test "$(git remote get-url --push --all t3code-upstream)" = "DISABLED"
          git fetch --prune t3code-upstream +refs/heads/main:refs/remotes/t3code-upstream/main

      - name: Refresh vendor mirror branch
        run: |
          git fetch --prune origin +refs/heads/vendor/t3code-main:refs/remotes/origin/vendor/t3code-main || true
          git push origin refs/remotes/t3code-upstream/main:refs/heads/vendor/t3code-main --force-with-lease

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync and review upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRITONAI_SYNC_GITHUB_REPO: ${{ github.repository }}
          GH_REPO: ${{ github.repository }}
          TRITONAI_SYNC_DOWNSTREAM_BRANCH: ${{ vars.TRITONAI_SYNC_DOWNSTREAM_BRANCH || 'main' }}
          TRITONAI_SYNC_UPSTREAM_REMOTE: t3code-upstream
          TRITONAI_SYNC_UPSTREAM_URL: https://github.com/pingdotgg/t3code.git
          TRITONAI_SYNC_UPSTREAM_BRANCH: main
          TRITONAI_SYNC_CHECKS: ${{ vars.TRITONAI_SYNC_CHECKS || 'bun run typecheck && bun run test' }}
          TRITONAI_SYNC_AGENT_COMMAND: ${{ secrets.TRITONAI_SYNC_AGENT_COMMAND }}
          TRITONAI_SYNC_AGENT_CAN_EDIT: ${{ vars.TRITONAI_SYNC_AGENT_CAN_EDIT || '0' }}
          TRITONAI_SYNC_AGENT_SECRET_ENV_ALLOWLIST: ${{ vars.TRITONAI_SYNC_AGENT_SECRET_ENV_ALLOWLIST || 'CODEX_HOME,TRITONAI_HOME,TRITONAI_API_KEY' }}
          CODEX_HOME: ${{ vars.CODEX_HOME }}
          TRITONAI_HOME: ${{ vars.TRITONAI_HOME }}
          TRITONAI_API_KEY: ${{ secrets.TRITONAI_API_KEY }}
        run: |
          downstream_branch="${{ github.event.inputs.downstream_branch }}"
          if [[ -z "$downstream_branch" ]]; then
            downstream_branch="${TRITONAI_SYNC_DOWNSTREAM_BRANCH:-main}"
          fi
          export TRITONAI_SYNC_DOWNSTREAM_BRANCH="$downstream_branch"

          create_pr="${{ github.event.inputs.create_pr }}"
          if [[ -z "$create_pr" ]]; then
            create_pr="true"
          fi

          skip_checks="${{ github.event.inputs.skip_checks }}"
          if [[ -z "$skip_checks" ]]; then
            skip_checks="false"
          fi

          args=(--push)

          if [[ "$create_pr" == "true" ]]; then
            args+=(--create-pr)
          fi

          if [[ "$skip_checks" == "true" ]]; then
            args+=(--skip-checks)
          fi

          node scripts/tritonai-sync-upstream.mjs "${args[@]}"
